<!DOCTYPE html>
<html>
<head>
  <title>SipersPro (Sistem Informasi Persuratan)</title>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbyrGa2LlH9OBAGi2IxGyogvq_kQ6o4Z0xgWSBcpzwPm5lxS2tvU4J7fhsRaORzTfqk24g/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
